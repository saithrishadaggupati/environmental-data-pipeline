version: '3.8'

services:
  aqi-pipeline:
    build: .
    container_name: aqi_pipeline
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  aqi-dashboard:
    build: .
    container_name: aqi_dashboard
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    env_file:
      - .env
    ports:
      - '8501:8501'
    restart: unless-stopped