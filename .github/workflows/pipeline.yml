name: Daily AQI Pipeline

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AQI fetch
        env:
          API_KEY: ${{ secrets.API_KEY }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python -m src.ingestion.fetch_aqi

      - name: Run clean and validate
        run: python -m src.transformation.clean_aqi

      - name: Store to MongoDB
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python -m src.loading.mongo_store

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/raw/aqi_data.csv data/processed/clean_aqi.csv
          git diff --staged --quiet || git commit -m "data: update AQI data [skip ci]"
          git push